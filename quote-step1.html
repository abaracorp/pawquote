    <script>
        var owl = $('.owl-carousel');
        owl.owlCarousel({
            items: 3,
            loop: true,
            margin: 40,
            autoplay: false,
            autoplayTimeout: 3000,
            autoplayHoverPause: true
        });

    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const petCards = document.querySelectorAll('.pet-card'); // Get all pet cards

            petCards.forEach(card => {
                const radioInput = card.querySelector('input[type="radio"]'); // Get the radio button inside this card

                // Add a click event listener to the entire card
                card.addEventListener('click', () => {
                    // Deselect all other cards and their radio buttons
                    petCards.forEach(otherCard => {
                        otherCard.classList.remove('selected'); // Remove red background
                        const otherRadio = otherCard.querySelector('input[type="radio"]');
                        if (otherRadio && otherRadio !== radioInput) { // Ensure not to uncheck the current one
                            otherRadio.checked = false;
                        }
                    });

                    // Select the clicked card and its radio button
                    card.classList.add('selected'); // Add red background to the clicked card
                    if (radioInput) {
                        radioInput.checked = true; // Check the radio button inside the clicked card
                    }
                });

                // Optional: If a card is initially checked, apply the red background on page load
                if (radioInput && radioInput.checked) {
                    card.classList.add('selected');
                }
            });
        });
    </script>
